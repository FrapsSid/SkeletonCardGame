name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TestsRunner/TestsRunner.csproj

      - name: Build
        run: dotnet build TestsRunner/TestsRunner.csproj --configuration Release --no-restore

      - name: Run smoke tests
        run: >
          dotnet run
          --project TestsRunner/TestsRunner.csproj
          --configuration Release
          --no-build
          --
          --registration Assets/Tests/test_registration.json
          --output TestResults
          --tags smoke

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults
          path: TestResults/

  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-WebGL-${{ runner.os }}-
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: WebGL
          buildName: SkeletonCardGame

      - name: Upload WebGL build
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL/

  deploy-webgl:
    name: Deploy WebGL
    runs-on: ubuntu-latest
    needs: build-webgl
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download WebGL build
        uses: actions/download-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL

      - name: Configure SSH
        env:
          WEB_DEPLOY_KEY: ${{ secrets.WEB_DEPLOY_KEY }}
          WEB_DEPLOY_KNOWN_HOSTS: ${{ secrets.WEB_DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$WEB_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$WEB_DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy WebGL
        env:
          WEB_DEPLOY_HOST: ${{ secrets.WEB_DEPLOY_HOST }}
          WEB_DEPLOY_USER: ${{ vars.WEB_DEPLOY_USER }}
        run: |
          WEB_DEPLOY_USER="${WEB_DEPLOY_USER:-skeleton-web-deploy}"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" build/WebGL/SkeletonCardGame/ "${WEB_DEPLOY_USER}@${WEB_DEPLOY_HOST}:/"
